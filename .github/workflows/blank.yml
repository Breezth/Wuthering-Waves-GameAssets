name: hi

on:
  push:
    branches:
      - 'main'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # 0. 删掉虚拟机预装的无用大组件
    - name: Free Disk Space
      run: |
        echo "=== 开始清空虚拟机冗余组件 ==="
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc
        sudo rm -rf /usr/local/share/boost
        sudo rm -rf "$AGENT_TOOLSDIRECTORY"
        echo "=== 空间腾出完毕，开始正常流水线 ==="

    # 1. 拉取代码
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. 安装压缩工具
    - name: Install WebP Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y webp

    # 3. rainyun
    - name: Fetch Remote Uploaded List
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.SFTP_USERNAME }}     
        AWS_SECRET_ACCESS_KEY: ${{ secrets.SFTP_PASSWORD }} 
        AWS_DEFAULT_REGION: 'cn-nb1'  
      run: |
        echo "正在拉取存储桶中已有的资产清单..."
        aws s3 ls s3://wutherin --recursive --endpoint-url https://cn-nb1.rains3.com | sed -E 's/^[0-9]{4}-[0-9]{2}-[0-9]{2} [0-9]{2}:[0-9]{2}:[0-9]{2} +[0-9]+ //' > remote_webps.txt
        echo "清单拉取成功，准备进行断点比对。"

    # 4. 剔除已上传文件
    - name: Filter Remaining Images (Breakpoint Resume)
      run: |
        python3 -c "
        import os
        remote_webps = set()
        if os.path.exists('remote_webps.txt'):
            with open('remote_webps.txt', 'r', encoding='utf-8') as f:
                for line in f:
                    line = line.strip()
                    if line:
                        remote_webps.add(line)
        
        todo_pngs = []
        for root, dirs, files in os.walk('.'):
            if '.git' in root or '.github' in root:
                continue
            for file in files:
                if file.endswith('.png'):
                    local_png_path = os.path.join(root, file)
                    s3_key = os.path.relpath(local_png_path, '.').replace(os.sep, '/')
                    s3_webp_key = s3_key.rsplit('.', 1)[0] + '.webp'
                    
                    if s3_webp_key in remote_webps:
                        try:
                            os.remove(local_png_path)
                        except:
                            pass
                    else:
                        todo_pngs.append(local_png_path)
        
        with open('todo_png.txt', 'w', encoding='utf-8') as f:
            for png in todo_pngs:
                f.write(png + '\n')
        print('=== 断点状态报告 ===')
        print(f'已存在: {len(remote_webps)} 张图片')
        print(f'本次需补传: {len(todo_pngs)} 张新图片')
        "

    # 5. 仅对剩余的资产进行压缩
    - name: Convert Remaining PNG to WebP
      run: |
        echo "剩余资产..."
        TOTAL_FILES=$(wc -l < todo_png.txt)
        echo "本次待办队列共计: $TOTAL_FILES 张图片。"
        
        if [ "$TOTAL_FILES" -eq 0 ]; then
          echo "所有图片已全部完成，跳过转换阶段。"
        else
          tr '\n' '\0' < todo_png.txt | xargs -0 -r -P 2 -n 50 bash -c '
            for img; do
              cwebp -quiet -q 85 -m 4 "$img" -o "${img%.png}.webp" && rm "$img"
            done
            echo "====> [实时反馈] 成功追加转换 50 张新图片！"
          ' _
        fi
        echo "剩余图像高保真转换完成。"

    # 6. 安全拦截
    - name: Check Folder Size Safely
      run: |
        REAL_SIZE_KB=$(du -s --exclude=".git" --exclude=".github" . | awk '{print $1}')
        REAL_SIZE_GB=$(awk "BEGIN {print $REAL_SIZE_KB/1024/1024}")
        
        echo "=============================================="
        echo "当前增量包在本地占用的总空间为: $REAL_SIZE_GB GB"
        echo "=============================================="
        
        if [ "$REAL_SIZE_KB" -gt 18874368 ]; then
          echo "【安全拦截】体积异常超标！"
          exit 1
        fi
        echo "空间安全，准备最终补齐对接。"

    # 7. S3 同步
    - name: Sync to RainS3 via Native S3 Protocol
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.SFTP_USERNAME }}     
        AWS_SECRET_ACCESS_KEY: ${{ secrets.SFTP_PASSWORD }} 
        AWS_DEFAULT_REGION: 'cn-nb1'                        
      run: |
        aws s3 sync ./ s3://wutherin --endpoint-url https://cn-nb1.rains3.com --exclude ".git/*" --exclude ".github/*" --exclude "remote_webps.txt" --exclude "todo_png.txt"
